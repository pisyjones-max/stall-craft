<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{{title}} — Сталь Крафт</title>
<meta name="description" content="{{description}}"/>
<meta name="keywords" content="{{keywords}}"/>
<meta name="robots" content="index, follow"/>
<link rel="canonical" href="{{siteUrl}}/blog/{{slug}}/"/>
<meta property="og:type" content="article"/>
<meta property="og:url" content="{{siteUrl}}/blog/{{slug}}/"/>
<meta property="og:title" content="{{title}}"/>
<meta property="og:description" content="{{description}}"/>
<meta property="og:image" content="{{siteUrl}}/img/og-cover.webp"/>
<link rel="icon" type="image/x-icon" href="/img/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Geologica:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/layout.css"/>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{title}}",
  "description": "{{description}}",
  "datePublished": "{{publishedAt}}",
  "author": { "@type": "Organization", "name": "Сталь Крафт" },
  "mainEntityOfPage": "{{siteUrl}}/blog/{{slug}}/"
}
</script>
<style>
  .blog-wrap{max-width:760px;margin:0 auto;padding:48px 24px 80px}
  .blog-back{font-size:13px;color:var(--muted);text-decoration:none}
  .blog-title{font-family:var(--fh);font-size:clamp(24px,4vw,32px);font-weight:800;margin:16px 0 8px;color:var(--dark)}
  .blog-date{font-size:13px;color:var(--muted);margin-bottom:32px}
  .blog-body{font-size:15px;line-height:1.75;color:var(--text)}
  .blog-body h2{font-family:var(--fh);font-size:22px;margin:32px 0 12px;color:var(--dark)}
  .blog-body p{margin-bottom:14px}
  .blog-body table{width:100%;border-collapse:collapse;margin:16px 0}
  .blog-body th,.blog-body td{border:1px solid var(--border);padding:8px 12px;text-align:left;font-size:14px}
  .blog-body ul{margin:0 0 14px 20px}
  .blog-cta{margin-top:40px;padding:24px;background:var(--dark);color:#fff;border-radius:var(--rl);text-align:center}
  .blog-cta a{display:inline-block;margin-top:12px;background:var(--accent);color:#fff;padding:12px 24px;border-radius:var(--r);font-weight:600}
</style>
</head>
<body>
<div class="blog-wrap">
  <a class="blog-back" href="/blog/">← Все статьи</a>
  <h1 class="blog-title">{{title}}</h1>
  <div class="blog-date">{{publishedAt}}</div>
  <div class="blog-body">{{body}}</div>
  <div class="blog-cta">
    <div>Нужен расчёт под ваш случай?</div>
    <a href="https://t.me/+79154683925">Написать в Telegram</a>
  </div>
</div>
</body>
</html>
