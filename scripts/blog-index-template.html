<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Блог — Сталь Крафт</title>
<meta name="description" content="Статьи о навесах, гаражах и воротах: материалы, цены, сроки монтажа в Раменском округе."/>
<link rel="canonical" href="{{siteUrl}}/blog/"/>
<link rel="icon" type="image/x-icon" href="/img/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Geologica:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/layout.css"/>
<style>
  .blog-wrap{max-width:860px;margin:0 auto;padding:48px 24px 80px}
  .blog-h1{font-family:var(--fh);font-size:30px;font-weight:800;margin-bottom:24px;color:var(--dark)}
  .blog-card{display:block;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rl);padding:20px 24px;margin-bottom:16px}
  .blog-card-date{font-size:12px;color:var(--muted);margin-bottom:6px}
  .blog-card-title{font-size:18px;font-weight:700;margin-bottom:6px;color:var(--dark)}
  .blog-card-excerpt{font-size:14px;color:var(--muted);line-height:1.5}
</style>
</head>
<body>
<div class="blog-wrap">
  <h1 class="blog-h1">Блог Сталь Крафт</h1>
  {{items}}
</div>
</body>
</html>
